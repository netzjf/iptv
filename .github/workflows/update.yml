name: Auto Update IPTV Sources

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    permissions:
      deployments: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build sources
        run: |
          mkdir -p m3u
          pnpm build

      - name: Remove oversized EPG file (exceeds 25 MiB limit)
        run: |
          # 删除部署目录下的 epg_pw.xml
          rm -f dist/epg/epg_pw.xml
          # 同时删除其他可能位置的同名文件
          find . -name "epg_pw.xml" -type f -delete

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: iptv        # 🔁 替换成你的 Pages 项目名
          directory: ./m3u                     # 🔁 替换成你的构建输出目录
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
