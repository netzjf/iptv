name: Auto Update IPTV Sources

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    permissions:
      deployments: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build sources
        run: |
          # 创建缺失的目录
          mkdir -p m3u
          # 如果还有 epg 目录也需要，可以取消下一行注释
          # mkdir -p epg
          pnpm build

      - name: Remove oversized EPG file (exceeds 26.2 MB limit)
        run: find . -name "epg_pw.xml" -type f -size +25M -delete

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: iptv
          directory: ./m3u
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
