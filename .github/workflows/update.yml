name: Auto Update IPTV Sources

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    permissions:
      deployments: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build sources
        run: |
          mkdir -p m3u
          pnpm build

      - name: Compress EPG file
        run: |
          # 找到 epg_pw.xml 文件并压缩（压缩后约 3-4 MB，远小于 25 MB 限制）
          find . -name "epg_pw.xml" -type f -exec gzip -9 {} \;

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: iptv     # 🔁 替换成你的 Cloudflare Pages 项目名
          directory: ./m3u                  # 🔁 替换成你的构建输出目录
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
