name: Auto Update IPTV Sources

on:
  schedule:
    - cron: '0 12 * * *'   # 每天12:00 UTC
  workflow_dispatch:        # 允许手动触发

jobs:
  build:
    permissions:
      deployments: write     # 🔑 必须添加，允许 GitHub Token 创建 deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build sources
        run: pnpm build

      - name: Remove oversized EPG file (exceeds 26.2 MB limit)
        run: find . -name "epg_pw.xml" -type f -size +25M -delete

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: iptv      # 替换为你的 Pages 项目名
          directory: ./m3u               # 替换为你的输出目录
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
